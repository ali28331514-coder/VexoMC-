<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box PvP - VexoMC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Orbitron','Courier New',monospace;background:radial-gradient(circle at 20% 80%,#8B0000 0%,#1a1a2e 50%,#16213e 100%);min-height:100vh;overflow:hidden;position:relative;color:#fff}
        .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1;background:radial-gradient(2px 2px at 20px 30px, #ff4444, transparent),radial-gradient(2px 2px at 40px 70px, #ff6666, transparent);background-repeat:repeat;background-size:100px 100px;animation:twinkle 15s linear infinite}
        .container{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(145deg,rgba(139,0,0,.95),rgba(26,26,46,.98));backdrop-filter:blur(25px);border-radius:30px;padding:40px;box-shadow:0 30px 80px rgba(255,68,68,.4);width:95%;max-width:500px;height:90vh;max-height:800px;text-align:center;border:2px solid rgba(255,68,68,.6);overflow-y:auto;overflow-x:hidden}
        
        .minecraft-text{font-size:clamp(2.5em,8vw,4.5em);font-weight:900;background:linear-gradient(45deg,#ff4444,#ff6666,#ff4444,#cc0000);background-size:400% 400%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:rainbowShift 1.5s linear infinite;margin-bottom:25px;letter-spacing:4px;text-shadow:0 0 40px rgba(255,68,68,1)}
        
        .ip-section{margin:30px 0;padding:30px 20px;background:rgba(255,68,68,.45);border-radius:28px;border:4px solid rgba(255,68,68,1);box-shadow:0 25px 60px rgba(255,68,68,.6)}
        .server-ip{display:inline-block;font-size:clamp(1.4em,5vw,2em);font-weight:900;background:linear-gradient(135deg,#ff6666,#ff4444,#cc0000);padding:22px 40px;margin:0 auto;border-radius:22px;cursor:pointer;transition:all .4s ease;border:4px solid rgba(255,255,255,.8);box-shadow:0 15px 40px rgba(255,68,68,.7);text-shadow:0 0 20px rgba(255,255,255,1);white-space:nowrap;min-width:240px}
        .server-ip:hover{transform:scale(1.05);box-shadow:0 25px 60px rgba(255,68,68,.9);border-color:#fff}
        
        .copy-btn{background:linear-gradient(135deg,#ff4444,#cc0000);color:#fff;border:none;padding:18px 45px;font-size:1.2em;border-radius:28px;cursor:pointer;margin:20px auto;display:block;transition:all .4s ease;box-shadow:0 15px 45px rgba(255,68,68,.6);font-weight:900;text-transform:uppercase;letter-spacing:2px}
        .copy-btn:hover{transform:translateY(-5px);box-shadow:0 25px 60px rgba(255,68,68,.8)}
        
        .status-bar{display:flex;align-items:center;justify-content:center;gap:12px;margin:25px 0;padding:15px 35px;background:rgba(255,68,68,.5);border-radius:25px;border:3px solid #ff4444;box-shadow:0 0 30px rgba(255,68,68,.6)}
        .status{width:14px;height:14px;border-radius:50%;background:#ff4444;box-shadow:0 0 25px #ff4444;animation:pulse 1s infinite}
        
        /* القايمة - Box PvP بس */
        .qaim{position:relative;margin:30px auto;padding:35px 25px;background:linear-gradient(145deg,rgba(255,68,68,.4),rgba(204,0,0,.6));border-radius:30px;border:3px solid rgba(255,68,68,1);backdrop-filter:blur(20px);max-width:320px;box-shadow:0 30px 70px rgba(255,68,68,.5)}
        .qaim-title{font-size:1.8em;margin-bottom:25px;background:linear-gradient(45deg,#fff,#ff6666);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900;text-align:center;text-transform:uppercase;letter-spacing:3px;text-shadow:0 0 20px rgba(255,255,255,.5)}
        .qaim-list{display:flex;flex-direction:column;gap:20px;padding:0;text-align:center}
        .qaim-item{padding:20px 25px;background:linear-gradient(135deg,rgba(255,255,255,.3),rgba(255,255,255,.1));border-radius:20px;transition:all .4s ease;border:2px solid rgba(255,255,255,.4);font-size:1.4em;font-weight:900;text-transform:uppercase;position:relative;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.3)}
        .qaim-item::before{content:'⚔️';position:absolute;top:15px;right:20px;font-size:1.5em;opacity:.9}
        .qaim-item::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);transition:left .5s}
        .qaim-item:hover{background:linear-gradient(135deg,#ff6666,#ff4444);border-color:#fff;transform:translateY(-10px) scale(1.05);box-shadow:0 25px 60px rgba(255,68,68,.8)}
        .qaim-item:hover::after{left:100%}
        
        .platforms{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin:25px 0}
        .platform{width:65px;height:65px;border-radius:18px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.7em;text-decoration:none;transition:all .4s ease;box-shadow:0 12px 35px rgba(0,0,0,.5);border:3px solid rgba(255,255,255,.3)}
        .platform:hover{transform:translateY(-12px) scale(1.15);box-shadow:0 30px 60px rgba(255,68,68,.7)}
        .platform.server{background:linear-gradient(135deg,#ff4444,#cc0000)}
        .platform.discord{background:linear-gradient(135deg,#7289da,#5865f2)}
        .platform.tiktok{background:linear-gradient(135deg,#ff6b6b,#ee5a52)}
        .platform.youtube{background:linear-gradient(135deg,#f39c12,#e67e22)}
        
        @keyframes rainbowShift{0%{background-position:0% 50%}100%{background-position:400% 50%}}
        @keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.3)}}
        
        @media (max-width:600px){
            .container{padding:30px 25px;height:95vh;width:98%}
            .minecraft-text{letter-spacing:2px}
            .server-ip{font-size:clamp(1.2em,6vw,1.6em);padding:18px 25px;min-width:200px}
            .qaim{max-width:95%;padding:25px 20px}
            .qaim-item{padding:15px 20px;font-size:1.2em}
            .platform{width:55px;height:55px;font-size:1.4em}
        }
        
        /* Scrollbar مخصص */
        .container::-webkit-scrollbar{width:8px}
        .container::-webkit-scrollbar-track{background:rgba(255,255,255,.1);border-radius:10px}
        .container::-webkit-scrollbar-thumb{background:linear-gradient(#ff4444,#ff6666);border-radius:10px}
        .container::-webkit-scrollbar-thumb:hover{background:linear-gradient(#ff6666,#ff4444)}
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="minecraft-text">Box PvP</div>
        
        <div class="ip-section">
            <div class="server-ip" onclick="copyIP()">vexomc.play.hosting</div>
            <button class="copy-btn" onclick="copyIP()">⚔️ Join Server</button>
        </div>
        
        <div class="status-bar">
            <div class="status"></div>
            <span>🔴 Server Online</span>
        </div>
        
        <!-- القايمة - Box PvP بس -->
        <div class="qaim">
            <div class="qaim-title">Box PvP</div>
            <div class="qaim-list">
                <div class="qaim-item">Box PvP</div>
            </div>
        </div>
        
        <div class="platforms">
            <a href="https://vexomc.play.hosting" class="platform server" title="Server"><i class="fas fa-sword"></i></a>
            <a href="https://discord.gg/t8YaQxZZ" class="platform discord" title="Discord"><i class="fab fa-discord"></i></a>
            <a href="https://www.tiktok.com/@rynoxmc1" class="platform tiktok" title="TikTok"><i class="fas fa-fire"></i></a>
            <a href="https://www.youtube.com/channel/UCijZ7gc_WXjYEOE-dpLieBA" class="platform youtube" title="YouTube"><i class="fas fa-bolt"></i></a>
        </div>
    </div>
    
    <script>
        const IP = "vexomc.play.hosting";
        function copyIP(){
            navigator.clipboard.writeText(IP).then(()=>{
                const btn = document.querySelector(".copy-btn");
                const ipEl = document.querySelector(".server-ip");
                const oldText = btn.innerHTML;
                btn.innerHTML = "✅ Copied!";
                btn.style.background = "#00ff88";
                ipEl.style.background = "#00ff88";
                setTimeout(()=>{
                    btn.innerHTML = oldText;
                    btn.style.background = "";
                    ipEl.style.background = "";
                }, 2000);
            }).catch(()=>alert("Copy: "+IP));
        }
    </script>
</body>
</html>
